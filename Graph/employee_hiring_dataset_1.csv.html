      return {
        id: n.id,
        label: n.label,
        shape: 'dot',
        size: isCentral ? 24 : 16,
        color: {
          background: n.color || '#97c2fc',
          border: '#2b7ce9',
          highlight: {
            background: '#d2e5ff',
            border: '#2b7ce9'
          }
        },

          color: '#333333',
          face: 'sans-serif'
        },
        borderWidth: 1.5
      };
    }));

    var edges = new vis.DataSet(rawEdges.map(function(e) {
      return {
        from: e.from,
        to: e.to,
        label: e.label,
        arrows: {
          to: { enabled: true, scaleFactor: 0.6 }
        },
        color: {
          color: '#2b7ce9',
          highlight: '#2b7ce9',
          hover: '#2b7ce9'
        },
        font: {
          size: 10,
          color: '#333333',
          align: 'middle'
        },
        smooth: {
          type: 'continuous'
        }
      };
    }));

    var container = document.getElementById('network');
    var data = {
      nodes: nodes,
      edges: edges
    };
    
    var options = {
      physics: {
        stabilization: {
          enabled: true,
          iterations: 200
        },
        barnesHut: {
          gravitationalConstant: -15000,
          centralGravity: 0.1,
          springLength: 180,

        }

        navigationButtons: true,
        keyboard: true
      }
    };
