<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Graph Visualization - web_search_Expert_buying_guides</title>
  <style type="text/css">
    body {
      background-color: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #header {
      padding: 15px 20px;
      background-color: rgba(246, 248, 250, 0.9);
      border-bottom: 1px solid #d0d7de;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }
    #header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #24292f;
    }
    #header .stats {
      font-size: 12px;
      color: #57606a;
    }
    #network {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    .badge {
      background-color: #0969da;
      color: #ffffff;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-left: 5px;
      font-weight: 600;
    }
  </style>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
  <div id="header">
    <h1>Graph Visualization: <span style="color: #0969da;">web_search_Expert_buying_guides</span></h1>
    <div class="stats">
      Entities: <span class="badge">15</span>
      Relationships: <span class="badge">15</span>
    </div>
  </div>
  <div id="network"></div>

  <script type="text/javascript">
    var rawNodes = [{"id": "entity_expert", "label": "Expert", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_person", "label": "Person", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_skill", "label": "Skill", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_knowledge", "label": "Knowledge", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_subject", "label": "Subject", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_education_platform", "label": "Education Platform", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_video_lesson", "label": "Video Lesson", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_test", "label": "Test", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_practice_material", "label": "Practice Material", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_source", "label": "Source", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_dictionary", "label": "Dictionary", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_website", "label": "Website", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_mastery", "label": "Mastery", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_experience", "label": "Experience", "type": "Entity", "color": "#58a6ff"}, {"id": "entity_competence", "label": "Competence", "type": "Entity", "color": "#58a6ff"}];
    var rawEdges = [{"from": "entity_expert", "to": "entity_person", "label": "IS_A"}, {"from": "entity_expert", "to": "entity_skill", "label": "REQUIRES"}, {"from": "entity_expert", "to": "entity_knowledge", "label": "REQUIRES"}, {"from": "entity_expert", "to": "entity_subject", "label": "RELATES_TO"}, {"from": "entity_expert", "to": "entity_mastery", "label": "DEMONSTRATES"}, {"from": "entity_expert", "to": "entity_experience", "label": "REQUIRES"}, {"from": "entity_expert", "to": "entity_competence", "label": "REQUIRES"}, {"from": "entity_education_platform", "to": "entity_video_lesson", "label": "PROVIDES"}, {"from": "entity_education_platform", "to": "entity_test", "label": "PROVIDES"}, {"from": "entity_education_platform", "to": "entity_practice_material", "label": "PROVIDES"}, {"from": "entity_expert", "to": "entity_education_platform", "label": "USES"}, {"from": "entity_source", "to": "entity_website", "label": "IS_A"}, {"from": "entity_source", "to": "entity_dictionary", "label": "IS_A"}, {"from": "entity_dictionary", "to": "entity_expert", "label": "DEFINES"}, {"from": "entity_website", "to": "entity_expert", "label": "DEFINES"}];

    var nodes = new vis.DataSet(rawNodes.map(function(n) {
      var isCentral = n.type.toLowerCase() === 'transaction' || n.type.toLowerCase() === 'session';
      return {
        id: n.id,
        label: n.label,
        shape: 'dot',
        size: isCentral ? 24 : 16,
        color: {
          background: n.color || '#97c2fc',
          border: '#2b7ce9',
          highlight: {
            background: '#d2e5ff',
            border: '#2b7ce9'
          }
        },
        font: {
          size: 12,
          color: '#333333',
          face: 'sans-serif'
        },
        borderWidth: 1.5
      };
    }));

    var edges = new vis.DataSet(rawEdges.map(function(e) {
      return {
        from: e.from,
        to: e.to,
        label: e.label,
        arrows: {
          to: { enabled: true, scaleFactor: 0.6 }
        },
        color: {
          color: '#2b7ce9',
          highlight: '#2b7ce9',
          hover: '#2b7ce9'
        },
        font: {
          size: 10,
          color: '#333333',
          align: 'middle'
        },
        smooth: {
          type: 'continuous'
        }
      };
    }));

    var container = document.getElementById('network');
    var data = {
      nodes: nodes,
      edges: edges
    };
    
    var options = {
      physics: {
        stabilization: {
          enabled: true,
          iterations: 200
        },
        barnesHut: {
          gravitationalConstant: -15000,
          centralGravity: 0.1,
          springLength: 180,
          springConstant: 0.03,
          damping: 0.15
        }
      },
      interaction: {
        hover: true,
        tooltipDelay: 200,
        navigationButtons: true,
        keyboard: true
      }
    };
    
    var network = new vis.Network(container, data, options);
  </script>
</body>
</html>
